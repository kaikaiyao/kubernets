apiVersion: batch/v1
kind: Job
metadata:
  name: ${USER}-job-multigpu-test
  labels:
    eidf/user: ${USER}
    kueue.x-k8s.io/queue-name: ${INFK8S_QUEUE_NAME}
    kueue.x-k8s.io/priority-class: batch-workload-priority
spec:
  completions: 1
  parallelism: 1
  completionMode: Indexed
  backoffLimit: 2147483647
  activeDeadlineSeconds: 864000
  template:
    metadata:
      labels:
        eidf/user: ${USER}
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-A100-SXM4-40GB-MIG-1g.5gb  # Target MIG instances
      containers:
        - name: multigpu-test
          image: kaiyaoed/my_app:latest
          workingDir: "/workspace/kubernets"
          env:
            - name: TORCH_NCCL_ASYNC_ERROR_HANDLING
              value: "1"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: CUDA_VISIBLE_DEVICES  # Required for MIG visibility
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['nvidia.com/gpu']
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "=== MIG Device Check ==="
              nvidia-smi -L
              echo "CUDA_VISIBLE_DEVICES: $CUDA_VISIBLE_DEVICES"
              echo "PyTorch CUDA Available: $(python -c 'import torch; print(torch.cuda.is_available())'"
              
              echo "Starting training..."
              torchrun --nproc_per_node=$(echo $CUDA_VISIBLE_DEVICES | tr -cd , | wc -c) --standalone multigpu_train.py
          resources:
            limits:
              nvidia.com/mig-1g.5gb: "4"  # Request MIG instances instead of full GPUs
              cpu: "16"
              memory: "64Gi"
          volumeMounts:
            - name: workspace
              mountPath: /workspace/kubernets/results
            - name: nfs-user
              mountPath: /nfs-user
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: ${USER}-ws-multigpu-test
        - name: nfs-user
          nfs:
            server: $INFK8S_NFS_SERVER_IP
            path: /user/$USER