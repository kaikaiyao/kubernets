apiVersion: batch/v1
kind: Job
metadata:
  name: ${USER}-job-multigpu-test
  annotations:  # Add annotations for GPU specification
    nvidia.com/gpu.product: NVIDIA-A100-SXM4-40GB
  labels:
    eidf/user: ${USER}
    kueue.x-k8s.io/queue-name: ${INFK8S_QUEUE_NAME}
    kueue.x-k8s.io/priority-class: batch-workload-priority
spec:
  completions: 1
  parallelism: 1
  completionMode: Indexed
  backoffLimit: 2147483647
  activeDeadlineSeconds: 864000
  template:
    metadata:
      labels:
        eidf/user: ${USER}
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-A100-SXM4-40GB
        nvidia.com/mig.config: all-disabled  # Enforce full GPU mode
      containers:
        - name: multigpu-test
          image: kaiyaoed/my_app:latest
          workingDir: "/workspace/kubernets"
          env:
            - name: TORCH_NCCL_ASYNC_ERROR_HANDLING
              value: "1"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: NVIDIA_VISIBLE_DEVICES  # Use NVIDIA's device visibility
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['nvidia.com/gpu']
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "=== CUDA Device Check ==="
              nvidia-smi -L
              echo "Visible CUDA devices: $CUDA_VISIBLE_DEVICES"
              echo "PyTorch detected GPUs: $(python -c 'import torch; print(torch.cuda.device_count())')"
              
              echo "Starting training..."
              torchrun --nproc_per_node=$(nvidia-smi -L | wc -l) --standalone multigpu_train.py
              echo "Training finished"
          resources:
            limits:
              nvidia.com/gpu: "4"  # Must match node capacity
              cpu: "16"
              memory: "64Gi"
          volumeMounts:
            - name: workspace
              mountPath: /workspace/kubernets/results
            - name: nfs-user
              mountPath: /nfs-user
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: ${USER}-ws-multigpu-test
        - name: nfs-user
          nfs:
            server: $INFK8S_NFS_SERVER_IP
            path: /user/$USER