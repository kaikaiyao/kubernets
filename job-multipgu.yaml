apiVersion: batch/v1
kind: Job
metadata:
  name: ${USER}-job-multigpu-test
  labels:
    eidf/user: ${USER}
    kueue.x-k8s.io/queue-name: ${INFK8S_QUEUE_NAME}
    kueue.x-k8s.io/priority-class: batch-workload-priority
spec:
  completions: 1
  parallelism: 1
  completionMode: Indexed
  backoffLimit: 2147483647
  activeDeadlineSeconds: 864000
  template:
    metadata:
      labels:
        eidf/user: ${USER}
      annotations:
        nvidia.com/gpu.product: NVIDIA-A100-SXM4-40GB-MIG-3g.20gb
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-A100-SXM4-40GB-MIG-3g.20gb
      containers:
        - name: multigpu-test
          image: kaiyaoed/my_app:latest
          workingDir: "/workspace/kubernets"
          env:
            - name: TORCH_NCCL_ASYNC_ERROR_HANDLING
              value: "1"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: CUDA_VISIBLE_DEVICES
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['nvidia.com/gpu']
          command: ["/bin/bash", "-c"]
          args:
            - |
              # Get actual number of allocated MIG instances
              NUM_GPUS=$(echo $CUDA_VISIBLE_DEVICES | tr -cd ',' | wc -c)
              NUM_GPUS=$((NUM_GPUS + 1))
              
              echo "=== MIG Device Check ==="
              nvidia-smi -L
              echo "CUDA_VISIBLE_DEVICES: $CUDA_VISIBLE_DEVICES"
              echo "Detected GPUs: $NUM_GPUS"
              
              torchrun --nproc_per_node=$NUM_GPUS --standalone multigpu_train.py
          resources:
            limits:
              nvidia.com/mig-3g.20gb: 4  # Request 4 MIG instances
              cpu: "16"
              memory: "64Gi"
          volumeMounts:
            - name: workspace
              mountPath: /workspace/kubernets/results
            - name: nfs-user
              mountPath: /nfs-user
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: ${USER}-ws-multigpu-test
        - name: nfs-user
          nfs:
            server: $INFK8S_NFS_SERVER_IP
            path: /user/$USER