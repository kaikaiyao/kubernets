apiVersion: batch/v1
kind: Job
metadata:
  name: ${USER}-job-multigpu-test
  labels:
    eidf/user: ${USER}
    kueue.x-k8s.io/queue-name: ${INFK8S_QUEUE_NAME}
    kueue.x-k8s.io/priority-class: batch-workload-priority
spec:
  completions: 1
  parallelism: 1
  completionMode: Indexed
  backoffLimit: 2147483647
  activeDeadlineSeconds: 864000
  template:
    metadata:
      labels:
        eidf/user: ${USER}
      annotations:
        nvidia.com/gpu.product: NVIDIA-A100-SXM4-40GB-MIG-3g.20gb
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-A100-SXM4-40GB-MIG-1g.5gb
      containers:
        - name: multigpu-test
          image: kaiyaoed/my_app:latest
          workingDir: "/workspace/kubernets"
          env:
            - name: CUDA_VISIBLE_DEVICES
              value: "0,1,2,3"  # Explicit device indices for MIG
            - name: NVIDIA_VISIBLE_DEVICES
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['nvidia.com/gpu']
          command: ["/bin/bash", "-c"]
          args:
            - |
              # Verify actual GPU visibility
              echo "=== NVIDIA-SMI Output ==="
              nvidia-smi -L
              
              # Get available device count
              NUM_GPUS=$(python -c "import torch; print(torch.cuda.device_count())")
              echo "PyTorch Detected GPUs: $NUM_GPUS"
              
              # Validate before training
              if [ $NUM_GPUS -eq 0 ]; then
                echo "CRITICAL ERROR: No GPUs detected by PyTorch"
                exit 1
              fi
              
              torchrun --nproc_per_node=$NUM_GPUS --standalone multigpu_train.py
          resources:
            limits:
              nvidia.com/mig-1g.5gb: 4  # Must match your MIG request
              cpu: "16"
              memory: "64Gi"
          volumeMounts:
            - name: workspace
              mountPath: /workspace/kubernets/results
            - name: nfs-user
              mountPath: /nfs-user
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: ${USER}-ws-multigpu-test
        - name: nfs-user
          nfs:
            server: $INFK8S_NFS_SERVER_IP
            path: /user/$USER