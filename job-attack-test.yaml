apiVersion: batch/v1
kind: Job
metadata:
  name: ${USER}-job-attack-test-fixed-secure
  labels:
    eidf/user: ${USER}
    kueue.x-k8s.io/queue-name: ${INFK8S_QUEUE_NAME}
    kueue.x-k8s.io/priority-class: batch-workload-priority
spec:
  completions: 1
  parallelism: 1
  completionMode: Indexed
  backoffLimit: 2147483647
  activeDeadlineSeconds: 864000
  template:
    metadata:
      labels:
        eidf/user: ${USER}
      annotations:
        nvidia.com/gpu.product: NVIDIA-A100-SXM4-40GB
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-A100-SXM4-40GB
      containers:
        - name: my-app
          image: kaiyaoed/my_app:latest
          workingDir: "/workspace/kubernets"
          env:
          - name: TORCH_NCCL_ASYNC_ERROR_HANDLING
            value: "1"
          - name: NCCL_SOCKET_IFNAME
            value: "lo"
          - name: NCCL_NSOCKS_PERTHREAD
            value: "4"
          - name: NCCL_SOCKET_NTHREADS
            value: "2"
          - name: NCCL_DEBUG
            value: "INFO"
          - name: NCCL_IB_DISABLE
            value: "1"
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "Running experiment"
              mkdir -p /workspace/kubernets/results
              curl -o ffhq70k-paper256-ada.pkl "https://nvlabs-fi-cdn.nvidia.com/stylegan2-ada-pytorch/pretrained/paper-fig7c-training-set-sweeps/ffhq70k-paper256-ada.pkl"
              mkdir -p /workspace/kubernets/results
              torchrun --nproc_per_node=1 \
                      --nnodes=1 \
                      --node_rank=0 \
                      --master_addr=127.0.0.1 \
                      --master_port=12345 \
                      main.py attack \
                      --attack_type "fixed_secure" \
                      --stylegan2_url "https://nvlabs-fi-cdn.nvidia.com/stylegan2-ada-pytorch/pretrained/paper-fig7c-training-set-sweeps/ffhq70k-paper256-ada.pkl" \
                      --watermarked_model_path '/nfs-user/data/train_ffhq_encryp_300k_delta_ablation/delta_0_5/watermarked_model_20250223004630485657.pkl' \
                      --decoder_model_path '/nfs-user/data/train_ffhq_encryp_300k_delta_ablation/delta_0_5/decoder_model_20250223004630485657.pth' \
                      --num_conv_layers 7 \
                      --num_pool_layers 7 \
                      --initial_channels 64 \
                      --num_conv_layers_surr 7 \
                      --num_pool_layers_surr 7 \
                      --initial_channels_surr 64 \
                      --max_delta 0.5 \
                      --train_size 1000 \
                      --image_attack_size 100 
              exit_status=$?
              echo "Python script finished with exit status $exit_status"
              sleep infinity
          resources:
            limits:
              nvidia.com/gpu: "1"
              cpu: "8"
              memory: "32Gi"
          volumeMounts:
            - name: nfs-user
              mountPath: /nfs-user
      volumes:
        - name: nfs-user
          nfs:
            server: $INFK8S_NFS_SERVER_IP
            path: /user/$USER