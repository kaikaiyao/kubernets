apiVersion: batch/v1
kind: Job
metadata:
  name: my-app
  labels:
    eidf/user: $USER
spec:
  backoffLimit: 4
  template:
    metadata:
      labels:
        eidf/user: $USER
    spec:
      # Ensure the job runs on a GPU-enabled node (adjust label if needed)
      nodeSelector:
        nvidia.com/gpu.present: "true"
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: s2470447-infk8s-ws1
      containers:
        - name: my-app
          image: kaiyaoed/my_app:latest
          resources:
            limits:
              nvidia.com/gpu: "1"   # Request one GPU
              cpu: "2"              # Increase CPU to 2 cores
              memory: "16Gi"        # Increase memory to 16Gi
          volumeMounts:
            - name: workspace
              mountPath: /workspace  # Ensure this matches your saving path in your app's command
      restartPolicy: Never
