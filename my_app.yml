apiVersion: v1
kind: Pod
metadata:
  name: my-app
  labels:
    eidf/user: $USER
    kueue.x-k8s.io/queue-name: s2470447-infk8s-user-queue
spec:
  nodeSelector:
    nvidia.com/gpu.present: "true"
  volumes:
    - name: workspace
      persistentVolumeClaim:
        claimName: s2470447-infk8s-ws1
  containers:
    - name: my-app
      image: kaiyaoed/my_app:latest
      resources:
        limits:
          nvidia.com/gpu: "1"   # Request one GPU
          cpu: "1"              # Increase CPU to 2 cores
          memory: "4Gi"         # Increase memory to 16Gi
      volumeMounts:
        - name: workspace
          mountPath: /workspace  # Must match the saving path in your app's command
  restartPolicy: Never
