apiVersion: v1
kind: Pod
metadata:
  name: my_app
  labels:
    eidf/user: $USER
spec:
  backoffLimit: 4
  template:
    metadata:
      labels:
        eidf/user: $USER
    spec:
      # Ensure the job runs on a GPU-enabled node (adjust label if needed)
      nodeSelector:
        nvidia.com/gpu.present: "true"
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: s2470447-infk8s-ws1
      containers:
        - name: my_app
          # Replace with your actual image name from Docker Hub
          image: kaiyaoed/my_app:latest
          # Use the image’s default CMD (i.e. training command)
          # Alternatively, you can override the command here if needed.
          resources:
            limits:
              nvidia.com/gpu: "1"   # Request one GPU
              cpu: "2"              # Increase CPU to 2 cores
              memory: "16Gi"        # Increase memory to 16Gi
          volumeMounts:
            - name: workspace
              mountPath: /workspace  # Ensure this matches the saving path in your CMD
      restartPolicy: Never
