apiVersion: batch/v1
kind: Job
metadata:
  name: s2470447-infk8s-job-multigpu-test
  labels:
    eidf/user: ${USER}
    kueue.x-k8s.io/queue-name: ${INFK8S_QUEUE_NAME}
    kueue.x-k8s.io/priority-class: batch-workload-priority
spec:
  completions: 1
  parallelism: 1
  completionMode: Indexed
  backoffLimit: 2147483647
  activeDeadlineSeconds: 864000
  template:
    metadata:
      labels:
        eidf/user: s2470447
      annotations:
        nvidia.com/gpu.product: NVIDIA-A100-SXM4-40GB  # Updated to whole GPU
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-A100-SXM4-40GB  # Updated to whole GPU
      containers:
        - name: multigpu-test
          image: kaiyaoed/my_app:latest
          workingDir: "/workspace/kubernets"
          command: ["/bin/bash", "-c"]
          args:
            - |
              # Verify actual GPU visibility
              echo "=== NVIDIA-SMI Output ==="
              nvidia-smi -L
              
              # Clean up stale NCCL shared memory files
              rm -f /dev/shm/nccl-*
              
              # Set NCCL environment variables
              export NCCL_DEBUG=INFO
              export NCCL_P2P_DISABLE=1
              
              # Launch torchrun with 2 processes (1 per GPU)
              torchrun --nproc_per_node=2 --standalone /workspace/kubernets/multigpu_train.py  # Updated to 2 GPUs
          resources:
            limits:
              nvidia.com/gpu: 2  # Request 2 entire GPUs (not MIG)
              cpu: "16"
              memory: "64Gi"
          volumeMounts:
            - name: workspace
              mountPath: /workspace/kubernets/results
            - name: nfs-user
              mountPath: /nfs-user
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: s2470447-ws-multigpu-test
        - name: nfs-user
          nfs:
            server: $INFK8S_NFS_SERVER_IP
            path: /user/s2470447
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi