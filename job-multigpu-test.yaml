apiVersion: batch/v1
kind: Job
metadata:
  name: s2470447-infk8s-job-multigpu-test
  labels:
    eidf/user: ${USER}
    kueue.x-k8s.io/queue-name: ${INFK8S_QUEUE_NAME}
    kueue.x-k8s.io/priority-class: batch-workload-priority
spec:
  completions: 1
  parallelism: 1
  completionMode: Indexed
  backoffLimit: 2147483647
  activeDeadlineSeconds: 864000
  template:
    metadata:
      labels:
        eidf/user: s2470447
      annotations:
        nvidia.com/gpu.product: NVIDIA-A100-SXM4-40GB-MIG-1g.5gb
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-A100-SXM4-40GB-MIG-1g.5gb
      containers:
        - name: multigpu-test
          image: kaiyaoed/my_app:latest  # Replace with your actual image
          workingDir: "/workspace/kubernets"
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['nvidia.com/gpu']
          command: ["/bin/bash", "-c"]
          args:
            - |
              # Verify actual GPU visibility
              echo "=== NVIDIA-SMI Output ==="
              nvidia-smi -L
              
              # Clean up stale NCCL shared memory files
              rm -f /dev/shm/nccl-*
              
              # Set NCCL environment variables
              export NCCL_DEBUG=INFO
              export NCCL_P2P_DISABLE=1
              
              # Launch torchrun with 4 processes
              torchrun --nproc_per_node=4 --standalone /workspace/kubernets/multigpu_train.py
          resources:
            limits:
              nvidia.com/mig-1g.5gb: 4  # Request 4 MIG devices
              cpu: "16"
              memory: "64Gi"
          volumeMounts:
            - name: workspace
              mountPath: /workspace/kubernets/results
            - name: nfs-user
              mountPath: /nfs-user
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: s2470447-ws-multigpu-test  # Replace with your PVC
        - name: nfs-user
          nfs:
            server: $INFK8S_NFS_SERVER_IP  # Replace with your NFS server IP
            path: /user/s2470447  # Replace with your NFS path
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi  # 1GB shared memory