apiVersion: batch/v1
kind: Job
metadata:
  name: ${USER}-job-attack-${JOB_SUFFIX}
  labels:
    eidf/user: ${USER}
    kueue.x-k8s.io/queue-name: ${INFK8S_QUEUE_NAME}
    kueue.x-k8s.io/priority-class: batch-workload-priority
spec:
  completions: 1
  parallelism: 1
  completionMode: Indexed
  backoffLimit: 2147483647
  activeDeadlineSeconds: 864000
  template:
    metadata:
      labels:
        eidf/user: ${USER}
      annotations:
        nvidia.com/gpu.product: NVIDIA-A100-SXM4-40GB
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-A100-SXM4-40GB
      containers:
        - name: my-app
          image: kaiyaoed/my_app:latest
          workingDir: "/workspace/kubernets"
          env:
          - name: TORCH_NCCL_ASYNC_ERROR_HANDLING
            value: "1"
          - name: NCCL_SOCKET_IFNAME
            value: "lo"
          - name: NCCL_NSOCKS_PERTHREAD
            value: "4"
          - name: NCCL_SOCKET_NTHREADS
            value: "2"
          - name: NCCL_DEBUG
            value: "INFO"
          - name: NCCL_IB_DISABLE
            value: "1"
          - name: NUM_RUNS
            value: "8"
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "Running experiments sequentially"
              mkdir -p /workspace/kubernets/results
              curl -o ffhq70k-paper256-ada.pkl "https://nvlabs-fi-cdn.nvidia.com/stylegan2-ada-pytorch/pretrained/paper-fig7c-training-set-sweeps/ffhq70k-paper256-ada.pkl"
              
              total_runs=${NUM_RUNS:-1}
              echo "Will perform $total_runs runs"
              
              for run in $(seq 1 $total_runs); do
                echo "Starting run $run of $total_runs"
                torchrun --nproc_per_node=4 \
                        --nnodes=1 \
                        --node_rank=0 \
                        --master_addr=127.0.0.1 \
                        --master_port=12345 \
                        main.py attack \
                        --attack_type "base_baseline" \
                        --stylegan2_url "https://nvlabs-fi-cdn.nvidia.com/stylegan2-ada-pytorch/pretrained/paper-fig7c-training-set-sweeps/ffhq70k-paper256-ada.pkl" \
                        --watermarked_model_path '/nfs-user/data/baseline/watermarked_model_final_20250227003117999810.pkl' \
                        --decoder_model_path '/nfs-user/data/baseline/decoder_model_final_20250227003117999810.pth' \
                        --num_conv_layers 7 \
                        --num_pool_layers 7 \
                        --initial_channels 64 \
                        --num_conv_layers_surr 7 \
                        --num_pool_layers_surr 7 \
                        --initial_channels_surr 64 \
                        --max_delta 0.05 \
                        --train_size 200000 \
                        --image_attack_size 100 \
                        --num_steps_pgd 100 \
                        --attack_image_type "original_image" \
                        --alpha_values_pgd "0.01"
                
                exit_status=$?
                echo "Run $run finished with exit status $exit_status"
                
                if [ $exit_status -ne 0 ]; then
                  echo "Run $run failed with exit status $exit_status"
                  exit $exit_status
                fi
                
                echo "Waiting 30 seconds before next run..."
                sleep 30
              done
              
              echo "All runs completed successfully"
              sleep infinity
          resources:
            limits:
              nvidia.com/gpu: "4"
              cpu: "16"
              memory: "64Gi"
          volumeMounts:
            - name: nfs-user
              mountPath: /nfs-user
      volumes:
        - name: nfs-user
          nfs:
            server: $INFK8S_NFS_SERVER_IP
            path: /user/$USER